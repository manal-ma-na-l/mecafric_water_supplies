<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  font-family: Arial;
  background: #f5f5f5;
}
.card {
  position: relative;
  background: #fff;
  width: 180px;
  height: 200px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end; /* يخلي النص لتحت */
  align-items: center;
  padding-bottom: 20px;
  transition: 0.3s;
}

/* SVG / IMAGE فوق */
.card img {
  position: absolute;
  top: -90px; /* يطلع لفوق */
  width: 200px;
  height: 200px;
}

/* active */
.card.active {
  background: #1abc9c;
  color: white;
  transform: scale(1.1);
}
.products {
  text-align: center;
  padding: 40px;
}

.products h2 {
  font-size: 28px;
}

.products span {
  color: #1abc9c;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}
    </style>
</head>
<body>
    <section class="products">

  <div class="cards">
    <div class="card">
      <img src="../produit_image/Robinetterie/roubinet a soupape.svg" alt="">
      <p>Vanne à Opercule F4-F5 (DN40–300)</p>
      <button>+</button>
    </div>

  </div>
</section>

    <script>
const cards = document.querySelectorAll(".card");

cards.forEach(card => {
  card.addEventListener("click", () => {
    cards.forEach(c => c.classList.remove("active"));
    card.classList.add("active");
  });
});
</script>
</body>
</html>
